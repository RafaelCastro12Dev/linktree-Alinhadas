<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ALINHADAS • Pagamento</title>
  <meta name="description" content="Links oficiais de pagamento e envio de comprovante do evento Alinhadas." />

  <style>
    :root{
      --bg0:#07070a;
      --bg1:#121217;
      --gold:#caa24a;
      --gold2:#f1d58a;
      --text:#f6f3ea;
      --muted:#c7bfad;
      --stroke:rgba(202,162,74,.35);
      --shadow:0 22px 70px rgba(0,0,0,.62);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 680px at 18% -10%, rgba(202,162,74,.22), transparent 60%),
        radial-gradient(900px 560px at 92% 0%, rgba(241,213,138,.10), transparent 62%),
        radial-gradient(900px 800px at 60% 120%, rgba(202,162,74,.12), transparent 58%),
        linear-gradient(160deg,var(--bg0),var(--bg1));
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:24px 12px;
    }

    .wrap{
      width:min(620px,100%);
    }

    .card{
      border-radius:24px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }

    .hero{
      padding:18px;
      border-bottom:1px solid rgba(202,162,74,.22);
    }

    .banner{
      width:100%;
      border-radius:18px;
      border:1px solid rgba(241,213,138,.40);
      display:block;
      max-height:360px;
      object-fit:cover;
      box-shadow:0 15px 50px rgba(0,0,0,.6);
    }

    h1{
      margin:14px 0 4px;
      font-size:22px;
      letter-spacing:.3px;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:13.5px;
    }

    .content{
      padding:20px;
    }

    .sec{
      margin-bottom:12px;
      font-size:12px;
      color:rgba(241,213,138,.88);
      letter-spacing:.18em;
      text-transform:uppercase;
    }

    .btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px;
      border-radius:18px;
      border:1px solid rgba(241,213,138,.28);
      background: rgba(0,0,0,.22);
      color:var(--text);
      text-decoration:none;
      font-weight:700;
      margin-bottom:14px;
      transition:.2s;
    }

    .btn:hover{
      transform:translateY(-2px);
      background:rgba(202,162,74,.12);
      border-color:rgba(241,213,138,.55);
    }

    .btn strong{
      font-size:15px;
      display:block;
    }

    .btn small{
      font-size:12px;
      color:var(--muted);
      font-weight:500;
    }

    .foot{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      padding:20px;
      border-top:1px solid rgba(202,162,74,.15);
    }

  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="hero">
        <img class="banner" src="img/alinhadas.jpg" alt="Alinhadas">
        <h1>ALINHADAS</h1>
        <p class="sub">Especial Mês das Mulheres • Envie o comprovante após o pagamento</p>
      </div>

      <div class="content">

        <div class="sec">PAGAMENTO</div>

        <!-- BOTÃO CRÉDITO -->
        <a class="btn" href="https://mpago.la/1ezqQxj" target="_blank">
          <div>
            <strong>Pagamento no crédito</strong>
            <small>Mercado Pago</small>
          </div>
          <div>→</div>
        </a>

        <!-- BOTÃO SOLICITAR PIX -->
        <a class="btn" id="btnPix" href="#" target="_blank">
          <div>
            <strong>Solicitar chave Pix</strong>
            <small>Pedir pelo WhatsApp</small>
          </div>
          <div>→</div>
        </a>

        <!-- BOTÃO WHATSAPP COMPROVANTE -->
        <a class="btn" id="btnWhats" href="#" target="_blank">
          <div>
            <strong>WhatsApp</strong>
            <small>Enviar comprovante</small>
          </div>
          <div>→</div>
        </a>

      </div>

      <div class="foot">
        Envie o comprovante no WhatsApp junto com seu nome completo para confirmar sua presença.
        <br><br>
        © <span id="year"></span> • Alinhadas
      </div>

    </div>
  </div>

  <script>
    const whatsappNumero = "5519992969185";

    const mensagemPix =
      "Olá! Gostaria de receber a chave Pix para pagamento do evento Alinhadas.";

    const mensagemComprovante =
      "Olá! Estou enviando o comprovante do pagamento do evento Alinhadas junto com meu nome completo para confirmar minha presença.";

    document.getElementById("btnPix").href =
      "https://wa.me/" + whatsappNumero +
      "?text=" + encodeURIComponent(mensagemPix);

    document.getElementById("btnWhats").href =
      "https://wa.me/" + whatsappNumero +
      "?text=" + encodeURIComponent(mensagemComprovante);

    document.getElementById("year").textContent =
      new Date().getFullYear();
  </script>

</body>
</html>
